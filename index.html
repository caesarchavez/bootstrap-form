<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Bootstrap Form</title>
</head>
<body>
    <div class="container">
        <div class="card">
                <div class="card-header">
                    Payment from Example
                </div>
            <div class="container-fluid">
                <div class="alert alert-danger mt-3" role="alert">
                    Some fields are missing
                </div>
            </div>
            <div class="container-fluid">
                <form>
                    <div class="row ">
                        <div class="col">
                            <label for="CC">Card #</label>
                            <input type="text" class="form-control" placeholder="XXX-XXX-XXX">
                        </div>
                        <div class="col-3">
                            <label for="">CVC #</label>
                            <input type="text" class="form-control" placeholder="1234">
                        </div>
                        <div class="col-4">
                            <label for="">Amount</label>
                            <input type="text" class="form-control" placeholder="Amount">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col mt-3">
                            <label for="">First Name</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col mt-3">
                            <label for="">Last Name</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mt-3">
                            <label for="">City</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-3 mt-3">
                            <label for="">State</label>
                            <input type="text" class="form-control" placeholder="Pick a state">
                        </div>
                        <div class="col-3 mt-3">
                            <label for="">Postal Code</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col mt-3">
                            <label for="">We Accept:</label>
                        </div>
                        <div class="col mt-3">
                            <label for="">Message</label>
                            <input type="text-area" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <div class="col-6 inline bg-secondary">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
                                <label class="form-check-label" for="inlineCheckbox1"><i class="fa-brands fa-cc-mastercard"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
                                <label class="form-check-label" for="inlineCheckbox2"><i class="fa-brands fa-cc-visa"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
                                <label class="form-check-label" for="inlineCheckbox2"><i class="fa-brands fa-cc-diners-club"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
                                <label class="form-check-label" for="inlineCheckbox2"><i class="fa-brands fa-cc-amex"></i></label>
                            </div>
                        </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="card-footer d-flex justify-content-end mt-3">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="button" class="btn btn-primary ms-2">Send</button>
            </div>
        </div>
    </div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>   
</body>
</html>
